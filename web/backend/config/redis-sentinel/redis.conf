port 26379

# monitor the master by IP (no DNS needed)
#sentinel monitor mymaster 172.19.0.4 6379 1
#sentinel monitor mymaster 172.19.0.5 6379 1
sentinel monitor mymaster 172.18.0.2 6379 1
sentinel down-after-milliseconds mymaster 5000
sentinel failover-timeout mymaster 10000

# keep Sentinel healthy under DNS hiccups
sentinel resolve-hostnames yes
sentinel announce-hostnames yes
# when Sentinel tells clients who to talk to, use the hostname
sentinel announce-ip "sentinel"

# Generated by CONFIG REWRITE

dir "/data"

latency-tracking-info-percentiles 50 99 99.9
user default on nopass sanitize-payload ~* &* +@all
sentinel myid 830bba05ba5a2e3c2ba56ed8c4343d8d5f5ea1ef
sentinel config-epoch mymaster 224
sentinel leader-epoch mymaster 224
sentinel known-replica mymaster redis-replica 6379
sentinel known-replica mymaster 172.19.0.6 6379

sentinel current-epoch 224

sentinel known-replica mymaster 172.18.0.3 6379
